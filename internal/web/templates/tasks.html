<!-- Tasks Tab -->
<div id="tasks" class="tab-content active">
    <!-- Create Task Form -->
    <div class="card">
        <h2>Create New Task</h2>
        <form hx-post="/tasks" hx-target="#main-content" hx-push-url="false">
            <div class="form-group">
                <label for="title">Task Title *</label>
                <input type="text" id="title" name="title" required placeholder="Enter task title">
            </div>
            <div class="form-group">
                <label for="due_date">Due Date (optional)</label>
                <input type="date" id="due_date" name="due_date">
            </div>
            <button type="submit">Create Task</button>
        </form>
    </div>

    <!-- Task List -->
    <div class="card">
        <div class="toolbar">
            <h2>Task List</h2>
            <div class="flex-spacer"></div>
            <label class="text-small" style="cursor: pointer; display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="show-completed" onchange="toggleCompleted()" style="width: auto;">
                Show completed
            </label>
        </div>

        <!-- Sync Status Panel -->
        <div class="status-panel">
          <span class="text-bold">Sync Status:</span>
          <span id="sync-status" class="badge">Loading...</span>
          <span id="sync-last" class="text-small"></span>
          <span id="sync-next" class="text-small"></span>
          <span id="sync-error" class="text-danger text-small"></span>
          <div class="flex-spacer"></div>
          <button id="sync-now-btn" class="btn-small" onclick="triggerSync()">Sync Now</button>
        </div>
        {{if .tasks}}
        <div id="bulk-actions" style="display: none; margin-bottom: 1rem; padding: 1rem; background: var(--bg-color); border-radius: var(--radius); border: 1px solid var(--brand-color);">
            <span id="selected-count" class="text-small text-bold" style="margin-right: 1rem;">0 selected</span>
            <button type="button" hx-post="/tasks/bulk" hx-include=".task-checkbox:checked" hx-vals='{"action": "complete"}' hx-target="#main-content" class="btn-small">Complete Selected</button>
            <button type="button" hx-post="/tasks/bulk" hx-include=".task-checkbox:checked" hx-vals='{"action": "delete"}' hx-target="#main-content" class="btn-small" style="background: var(--status-text-failed);" onclick="return confirm('Delete selected tasks? This cannot be undone.')">Delete Selected</button>
        </div>
        <div class="table-container">
            <table id="task-table">
                <thead>
                    <tr>
                        <th style="width: 2rem;"><input type="checkbox" id="select-all" onchange="toggleSelectAll()"></th>
                        <th>Title</th>
                        <th>Status</th>
                        <th>Created</th>
                        <th>Due Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {{range .tasks}}
                    {{template "_task_row" .}}
                    {{end}}
                </tbody>
            </table>
        </div>
        <form hx-post="/tasks/purge-completed" hx-target="#main-content" style="margin-top:0.5rem; text-align:right;">
          <button type="submit" class="btn-small" style="background: var(--status-text-failed);" onclick="return confirm('Purge all completed tasks? This cannot be undone.')">✗ Purge Completed</button>
        </form>
        {{else}}
        <div class="empty-state">
            <p>No tasks yet.</p>
            <p>Create one above to get started!</p>
        </div>
        {{end}}
    </div>
</div>

<script>
    // Re-initialize visibility on swap
    toggleCompleted();
</script>
